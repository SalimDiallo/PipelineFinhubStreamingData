# Airflow (LocalExecutor + Postgres) pour orchestrer la pipeline batch.
#
# Lancer (depuis la racine du projet) :
#   docker compose -f airflow/docker-compose.yml up airflow-init   # init DB + user
#   docker compose -f airflow/docker-compose.yml up -d
#
# UI : http://localhost:8081  (login: airflow / airflow)
#
# Le code du projet est monté dans /opt/project pour que les DAGs importent
# `consumers` et `transformations`. Airflow communique avec Kafka/MinIO via le
# réseau docker hôte (host.docker.internal).

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3-python3.12
  # UID hôte pour aligner les permissions sur les volumes montés (logs, dags)
  user: "${AIRFLOW_UID:-1000}:0"
  environment: &airflow-env
    # Home explicite : permet à un UID arbitraire (non présent dans /etc/passwd)
    # de trouver son répertoire et évite getpwuid() KeyError
    HOME: /home/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Le code projet est sur le PYTHONPATH pour les imports des DAGs
    PYTHONPATH: /opt/project
    # Deps du projet installées dans l'image au démarrage (boto3, pandas, kafka...)
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-boto3>=1.34.0 kafka-python>=3.0.0 pandas>=2.2.0 pyarrow>=15.0.0 numpy>=1.26.0 python-dotenv>=1.0.0 finnhub-python>=2.4.28 websocket-client>=1.7.0 requests>=2.31.0 dbt-duckdb>=1.9.0}
    # Connexions via les réseaux docker partagés (listeners internes)
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    S3_ENDPOINT_URL: http://minio:9000
    S3_ACCESS_KEY: minioadmin
    S3_SECRET_KEY: minioadmin
    S3_BUCKET: datalake
    CONSUMER_GROUP: finhub-airflow
    BATCH_SIZE: "100"
    BATCH_TIMEOUT_S: "10"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ..:/opt/project        # racine du projet (consumers/, transformations/, ingestion/)
  networks:
    - default          # réseau airflow (postgres)
    - kafka            # réseau de la stack Kafka
    - infra            # réseau de MinIO
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    networks:
      - default
    volumes:
      - airflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    # Pas d'override d'entrypoint : l'entrypoint officiel crée l'entrée passwd
    # pour l'UID arbitraire, puis exécute notre commande bash.
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create --username airflow --password airflow \
          --firstname admin --lastname admin --role Admin --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

networks:
  default:
  kafka:
    external: true
    name: kafka_default
  infra:
    external: true
    name: infra_default

volumes:
  airflow_pg:

# Airflow (LocalExecutor + Postgres) pour orchestrer la pipeline batch.
#
# Lancer (depuis la racine du projet) :
#   docker compose -f airflow/docker-compose.yml up airflow-init   # init DB + user
#   docker compose -f airflow/docker-compose.yml up -d
#
# UI : http://localhost:8081  (login: airflow / airflow)
#
# Le code du projet est monté dans /opt/project pour que les DAGs importent
# `consumers` et `transformations`. Airflow communique avec Kafka/MinIO via le
# réseau docker hôte (host.docker.internal).

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3-python3.12
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Le code projet est sur le PYTHONPATH pour les imports des DAGs
    PYTHONPATH: /opt/project
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-}
    # Connexions vers les services tournant sur l'hôte
    KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
    S3_ENDPOINT_URL: http://host.docker.internal:9000
    S3_ACCESS_KEY: minioadmin
    S3_SECRET_KEY: minioadmin
    S3_BUCKET: datalake
    CONSUMER_GROUP: finhub-airflow
    BATCH_SIZE: "100"
    BATCH_TIMEOUT_S: "10"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ..:/opt/project        # racine du projet (consumers/, transformations/, ingestion/)
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on: &airflow-deps
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create --username airflow --password airflow \
          --firstname admin --lastname admin --role Admin --email admin@example.com
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  airflow_pg:
